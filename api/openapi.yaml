components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiTokenAuth:
      type: apiKey
      in: header
      name: X-API-Token
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      description: Numeric resource identifier
      schema:
        type: integer
        format: int64
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    GenericObjectResponse:
      type: object
      additionalProperties: true
    HealthResponse:
      type: object
      required: [status, version, db]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 0.1.0
        db:
          type: string
          example: up
    VersionResponse:
      type: object
      required: [version, commit, buildDate]
      properties:
        version:
          type: string
        commit:
          type: string
        buildDate:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    ForgotPasswordRequest:
      type: object
      required: [usernameOrEmail]
      properties:
        usernameOrEmail:
          type: string
    ResetPasswordRequest:
      type: object
      required: [token, password]
      properties:
        token:
          type: string
        password:
          type: string
          format: password
    AuthTokenResponse:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
    PrincipalSummary:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
    PrincipalResponse:
      type: object
      additionalProperties: true
      properties:
        user:
          $ref: '#/components/schemas/PrincipalSummary'
    BootstrapResponse:
      type: object
      additionalProperties: true
      properties:
        version:
          type: integer
        generatedAt:
          type: string
          format: date-time
        app:
          $ref: '#/components/schemas/VersionResponse'
        branding:
          type: object
          additionalProperties: true
        modules:
          type: array
          items:
            type: object
            additionalProperties: true
        capabilities:
          type: object
          additionalProperties: true
        cache:
          type: object
          additionalProperties: true
        principal:
          $ref: '#/components/schemas/PrincipalSummary'
    ModuleEnablementUpdateRequest:
      type: object
      additionalProperties:
        type: boolean
    ModuleEnablementResponse:
      type: object
      additionalProperties: true
      properties:
        modules:
          type: array
          items:
            type: object
            additionalProperties: true
        flags:
          type: object
          additionalProperties:
            type: boolean
    RapidProContactField:
      type: object
      required: [key, label]
      description: Built-in RapidPro contact targets and custom contact fields returned by RapidPro.
      properties:
        key:
          type: string
        label:
          type: string
        valueType:
          type: string
    RapidProReporterFieldMapping:
      type: object
      required: [sourceKey, rapidProFieldKey]
      properties:
        sourceKey:
          type: string
        sourceLabel:
          type: string
        rapidProFieldKey:
          type: string
    RapidProReporterSyncValidation:
      type: object
      required: [isValid]
      properties:
        isValid:
          type: boolean
        errors:
          type: array
          items:
            type: string
    RapidProReporterSyncSettings:
      type: object
      required: [rapidProServerCode, availableFields, mappings, validation]
      properties:
        rapidProServerCode:
          type: string
        availableFields:
          description: Includes built-in RapidPro targets such as contact name and URNs, plus fetched custom contact fields.
          type: array
          items:
            $ref: '#/components/schemas/RapidProContactField'
        mappings:
          type: array
          items:
            $ref: '#/components/schemas/RapidProReporterFieldMapping'
        lastFetchedAt:
          type: string
          format: date-time
        validation:
          $ref: '#/components/schemas/RapidProReporterSyncValidation'
    RapidProReporterSyncUpdateRequest:
      type: object
      required: [rapidProServerCode, mappings]
      properties:
        rapidProServerCode:
          type: string
        mappings:
          type: array
          items:
            $ref: '#/components/schemas/RapidProReporterFieldMapping'
    RapidexWebhookDataValueMapping:
      type: object
      required: [field, dataElement]
      properties:
        field:
          type: string
        dataElement:
          type: string
        categoryOptionCombo:
          type: string
        attributeOptionCombo:
          type: string
    RapidexWebhookMappingConfig:
      type: object
      required: [flowUuid, dataset, orgUnitVar, periodVar, mappings]
      properties:
        flowUuid:
          type: string
        flowName:
          type: string
        dataset:
          type: string
        orgUnitVar:
          type: string
        periodVar:
          type: string
        payloadAoc:
          type: string
        mappings:
          type: array
          items:
            $ref: '#/components/schemas/RapidexWebhookDataValueMapping'
    RapidexWebhookMappingsValidation:
      type: object
      required: [isValid]
      properties:
        isValid:
          type: boolean
        errors:
          type: array
          items:
            type: string
    RapidexWebhookMappingsSettings:
      type: object
      required: [rapidProServerCode, dhis2ServerCode, mappings, validation]
      properties:
        rapidProServerCode:
          type: string
        dhis2ServerCode:
          type: string
        mappings:
          type: array
          items:
            $ref: '#/components/schemas/RapidexWebhookMappingConfig'
        validation:
          $ref: '#/components/schemas/RapidexWebhookMappingsValidation'
    RapidexWebhookMappingsUpdateRequest:
      type: object
      required: [rapidProServerCode, dhis2ServerCode, mappings]
      properties:
        rapidProServerCode:
          type: string
        dhis2ServerCode:
          type: string
        mappings:
          type: array
          items:
            $ref: '#/components/schemas/RapidexWebhookMappingConfig'
    RapidexIntegrationServerOption:
      type: object
      required: [code, name, systemType, suspended]
      properties:
        code:
          type: string
        name:
          type: string
        systemType:
          type: string
        suspended:
          type: boolean
    RapidexRapidProFlowResultOption:
      type: object
      required: [key, name, categories]
      properties:
        key:
          type: string
        name:
          type: string
        categories:
          type: array
          items:
            type: string
    RapidexRapidProFlowOption:
      type: object
      required: [uuid, name, archived, results]
      properties:
        uuid:
          type: string
        name:
          type: string
        type:
          type: string
        archived:
          type: boolean
        parentRefs:
          type: array
          items:
            type: string
        modifiedOn:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/RapidexRapidProFlowResultOption'
    RapidexDhis2DataElementRef:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
    RapidexDhis2DatasetOption:
      type: object
      required: [id, name, dataElements]
      properties:
        id:
          type: string
        name:
          type: string
        periodType:
          type: string
    RapidexDhis2DatasetMetadata:
      type: object
      required: [id, name, dataElements, categoryOptionCombos, attributeOptionCombos]
      properties:
        id:
          type: string
        name:
          type: string
        periodType:
          type: string
        lastRefreshedAt:
          type: string
          format: date-time
        dataElements:
          type: array
          items:
            $ref: '#/components/schemas/RapidexDhis2DataElementOption'
        categoryOptionCombos:
          type: array
          items:
            $ref: '#/components/schemas/RapidexDhis2CategoryOptionComboOption'
        attributeOptionCombos:
          type: array
          items:
            $ref: '#/components/schemas/RapidexDhis2AttributeOptionComboOption'
    RapidexDhis2DataElementOption:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        valueType:
          type: string
    RapidexDhis2CategoryOptionComboOption:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
    RapidexDhis2AttributeOptionComboOption:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
    RapidexWebhookMetadataSnapshot:
      type: object
      required: [rapidProServerCode, dhis2ServerCode, rapidProFlows, rapidProContactFields, dhis2Datasets, dhis2LoadedDatasetIds, dhis2DatasetMetadataById]
      properties:
        rapidProServerCode:
          type: string
        dhis2ServerCode:
          type: string
        lastRefreshedAt:
          type: string
          format: date-time
        rapidProFlows:
          type: array
          items:
            $ref: '#/components/schemas/RapidexRapidProFlowOption'
        rapidProContactFields:
          type: array
          items:
            $ref: '#/components/schemas/RapidProContactField'
        dhis2Datasets:
          type: array
          items:
            $ref: '#/components/schemas/RapidexDhis2DatasetOption'
        dhis2LoadedDatasetIds:
          type: array
          items:
            type: string
        dhis2DatasetMetadataById:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/RapidexDhis2DatasetMetadata'
    RapidexWebhookMetadataResponse:
      type: object
      required: [rapidProServerCode, dhis2ServerCode, rapidProServers, dhis2Servers, snapshot, warnings]
      properties:
        rapidProServerCode:
          type: string
        dhis2ServerCode:
          type: string
        scope:
          type: string
          enum: [catalog, datasets]
        datasetIds:
          type: array
          items:
            type: string
        rapidProServers:
          type: array
          items:
            $ref: '#/components/schemas/RapidexIntegrationServerOption'
        dhis2Servers:
          type: array
          items:
            $ref: '#/components/schemas/RapidexIntegrationServerOption'
        snapshot:
          $ref: '#/components/schemas/RapidexWebhookMetadataSnapshot'
        warnings:
          type: array
          items:
            type: string
    RapidexWebhookMetadataRefreshRequest:
      type: object
      required: [rapidProServerCode, dhis2ServerCode]
      properties:
        rapidProServerCode:
          type: string
        dhis2ServerCode:
          type: string
    RapidexWebhookMappingsImportRequest:
      type: object
      required: [yaml]
      properties:
        yaml:
          type: string
    RapidexWebhookMappingsExportResponse:
      type: object
      required: [yaml]
      properties:
        yaml:
          type: string
    ExternalRequestSummaryServer:
      type: object
      required: [uid, code, name]
      properties:
        uid:
          type: string
        code:
          type: string
        name:
          type: string
    ExternalRequestSummaryPeriod:
      type: object
      required: [startDate, endDate, timeBasis, timezone]
      properties:
        startDate:
          type: string
        endDate:
          type: string
        timeBasis:
          type: string
          example: createdAt
        timezone:
          type: string
          example: UTC
    ExternalRequestSummaryCounts:
      type: object
      required: [total, pending, blocked, processing, succeeded, failed]
      properties:
        total:
          type: integer
        pending:
          type: integer
        blocked:
          type: integer
        processing:
          type: integer
        succeeded:
          type: integer
        failed:
          type: integer
    ExternalRequestSummaryResponse:
      type: object
      required: [destinationServer, period, summary]
      properties:
        destinationServer:
          $ref: '#/components/schemas/ExternalRequestSummaryServer'
        period:
          $ref: '#/components/schemas/ExternalRequestSummaryPeriod'
        summary:
          $ref: '#/components/schemas/ExternalRequestSummaryCounts'
    ApiTokenCreateRequest:
      type: object
      additionalProperties: true
      properties:
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
    ScheduledJobUpsertRequest:
      type: object
      required:
        - code
        - name
        - jobCategory
        - jobType
        - scheduleType
        - scheduleExpr
        - timezone
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        jobCategory:
          type: string
          enum: [integration, maintenance]
        jobType:
          type: string
        scheduleType:
          type: string
          enum: [cron, interval]
        scheduleExpr:
          type: string
        timezone:
          type: string
        enabled:
          type: boolean
        allowConcurrentRuns:
          type: boolean
        config:
          type: object
          additionalProperties: true
    ScheduledJobRecord:
      type: object
      additionalProperties: true
      properties:
        id:
          type: integer
        uid:
          type: string
        code:
          type: string
        name:
          type: string
        description:
          type: string
        jobCategory:
          type: string
          enum: [integration, maintenance]
        jobType:
          type: string
        scheduleType:
          type: string
          enum: [cron, interval]
        scheduleExpr:
          type: string
        timezone:
          type: string
        enabled:
          type: boolean
        allowConcurrentRuns:
          type: boolean
        config:
          type: object
          additionalProperties: true
        lastRunAt:
          type: string
          format: date-time
          nullable: true
        nextRunAt:
          type: string
          format: date-time
          nullable: true
        lastSuccessAt:
          type: string
          format: date-time
          nullable: true
        lastFailureAt:
          type: string
          format: date-time
          nullable: true
        latestRunStatus:
          type: string
          enum: [pending, running, succeeded, failed, cancelled, skipped]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ScheduledJobRunRecord:
      type: object
      additionalProperties: true
      properties:
        id:
          type: integer
        uid:
          type: string
        scheduledJobId:
          type: integer
        scheduledJobUid:
          type: string
        scheduledJobCode:
          type: string
        scheduledJobName:
          type: string
        triggerMode:
          type: string
          enum: [scheduled, manual]
        scheduledFor:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [pending, running, succeeded, failed, cancelled, skipped]
        workerId:
          type: integer
          nullable: true
        errorMessage:
          type: string
        resultSummary:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ScheduledJobListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScheduledJobRecord'
        totalCount:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    ScheduledJobRunListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ScheduledJobRunRecord'
        totalCount:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    PaginationMeta:
      type: object
      additionalProperties: true
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    ListEnvelope:
      type: object
      additionalProperties: true
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        error:
          type: object
          additionalProperties: true
          properties:
            code:
              type: string
            message:
              type: string
