sukumad:
  requests:
    metadata_columns:
      - key: "patientId"
        label: "Patient ID"
        type: "string"
        searchable: true
        visible_by_default: true
      - key: "submittedAt"
        label: "Submitted At"
        type: "datetime"
        searchable: false
        visible_by_default: false
  submission_window:
    default:
      start_hour: 0
      end_hour: 0
    destinations: {}
  retry:
    default:
      max_retries: 2
    destinations: {}
  response_filter:
    default:
      allowed_content_types:
        - "application/json"
        - "application/*+json"
        - "application/xml"
        - "text/xml"
      allow_unknown: false
    destinations: {}
  retention:
    enabled: false
    dry_run: true
    terminal_age_days: 30
    batch_size: 100
  rate_limit:
    default:
      requests_per_second: 2
      burst: 2
    destinations: {}
  ingest:
    directory:
      enabled: false
      inbox_path: ""
      processing_path: ""
      processed_path: ""
      failed_path: ""
      allowed_extensions:
        - ".json"
      default_source_system: "directory"
      require_idempotency_key: true
      debounce_milliseconds: 1000
      retry_delay_seconds: 30
      claim_timeout_seconds: 300
      scan_interval_seconds: 30
      batch_size: 10
  workers:
    heartbeat_seconds: 10
    outbound_logging:
      enabled: true
      body_preview_bytes: 256
    recovery:
      stale_delivery_after_seconds: 300
    send:
      interval_seconds: 5
      batch_size: 10
    retry:
      interval_seconds: 5
      batch_size: 10
    poll:
      interval_seconds: 5
      batch_size: 10
      claim_timeout_seconds: 60
    retention:
      interval_seconds: 300
  scheduler:
    enabled: true
    dispatcher:
      enabled: true
      interval_seconds: 15
      batch_size: 10
    worker:
      interval_seconds: 5
      batch_size: 5
