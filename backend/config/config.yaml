logging:
  level: "info"
  format: "console"

server:
  port: ":8080"
  shutdown_timeout_seconds: 10
  cors_allowed_origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
    - "wails://wails.localhost"
    - "wails://wails.localhost:*"

database:
  dsn: "postgres://postgres:postgres@127.0.0.1:5432/sukumadpro?sslmode=disable"
  max_open_conns: 10
  max_idle_conns: 5
  auto_migrate: false
  auto_migrate_lock_timeout_seconds: 30

auth:
  access_token_ttl_seconds: 900
  refresh_token_ttl_seconds: 604800
  jwt_signing_key: "dev-insecure-signing-key"
  password_hash_cost: 12
  api_token_enabled: true
  api_token_header_name: "X-API-Token"
  api_token_ttl_seconds: 2592000
  api_token_allow_bearer: false

security:
  rate_limit:
    enabled: false
    requests_per_second: 5
    burst: 10
  cors:
    enabled: true
    allowed_origins:
      - "wails://wails.localhost"
      - "wails://wails.localhost:*"
      - "http://localhost:5173"
      - "http://127.0.0.1:5173"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "PATCH"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "Authorization"
      - "Content-Type"
      - "X-API-Token"
      - "X-Request-Id"
    allow_credentials: false

seed:
  enable_dev_bootstrap: false

modules:
  flags: {}

sukumad:
  submission_window:
    default:
      start_hour: 0
      end_hour: 0
    destinations: {}
  retry:
    default:
      max_retries: 2
    destinations: {}
  response_filter:
    default:
      allowed_content_types:
        - "application/json"
        - "application/*+json"
        - "application/xml"
        - "text/xml"
      allow_unknown: false
    destinations: {}
  retention:
    enabled: false
    dry_run: true
    terminal_age_days: 30
    batch_size: 100
  rate_limit:
    default:
      requests_per_second: 2
      burst: 2
    destinations: {}
  workers:
    heartbeat_seconds: 10
    recovery:
      stale_delivery_after_seconds: 300
    send:
      interval_seconds: 5
      batch_size: 10
    retry:
      interval_seconds: 5
      batch_size: 10
    poll:
      interval_seconds: 5
      batch_size: 10
      claim_timeout_seconds: 60
    retention:
      interval_seconds: 300
